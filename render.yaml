services:
  - type: web
    name: tradeview
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 1 --timeout 120 --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.10.11
